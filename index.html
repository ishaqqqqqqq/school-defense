<!DOCTYPE html>
<html>
<head>
  <title>School Defense</title>
  <style>
    body {
      margin: 0;
      background: #222;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      text-align: left;
      z-index: 2;
      font-size: 14px;
    }
    #shop {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 2;
    }
    button {
      margin-top: 5px;
      width: 100%;
      cursor: pointer;
      background: #444;
      color: #fff;
      border: 1px solid #777;
      border-radius: 4px;
      padding: 4px;
    }
    button:disabled {
      background: #222;
      color: #777;
      border-color: #555;
      cursor: default;
    }
    canvas {
      display: block;
      margin: 0 auto;
      background: #333;
      border-top: 10px solid #555;
      border-bottom: 10px solid #555;
    }
    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 20px 30px;
      border-radius: 10px;
      display: none;
      z-index: 3;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div>Credits: <span id="credits">0</span></div>
    <div>Gun: <span id="gunName">Pencil Shooter</span></div>
    <div>Damage: <span id="damage">1</span></div>
    <div>Fire Rate: <span id="firerate">400 ms</span></div>
    <div>Health: <span id="health">3</span></div>
  </div>

  <div id="shop">
    <div><strong>Shop</strong></div>
    <div>Buy better “weapons” with credits:</div>
    <button id="buyNerf">Nerf Blaster ($150)</button>
    <button id="buyRubber">Rubber Band Launcher ($400)</button>
    <button id="buyPaper">Paper Airplane Cannon ($900)</button>
  </div>

  <div id="gameOver">
    <h2>Game Over</h2>
    <p>You did your best defending the school.</p>
    <button id="restartBtn">Restart</button>
  </div>

  <canvas id="game" width="900" height="500"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const creditsEl = document.getElementById('credits');
    const gunNameEl = document.getElementById('gunName');
    const damageEl = document.getElementById('damage');
    const firerateEl = document.getElementById('firerate');
    const healthEl = document.getElementById('health');

    const buyNerfBtn = document.getElementById('buyNerf');
    const buyRubberBtn = document.getElementById('buyRubber');
    const buyPaperBtn = document.getElementById('buyPaper');
    const gameOverBox = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;

    // Player
    const playerBase = {
      x: 80,
      y: HEIGHT - 140,
      w: 40,
      h: 80,
      color: '#4af',
      maxHealth: 3
    };
    let player;

    // Guns
    const guns = [
      { name: 'Pencil Shooter', damage: 1, fireRate: 400, cost: 0 },
      { name: 'Nerf Blaster', damage: 2, fireRate: 280, cost: 150 },
      { name: 'Rubber Band Launcher', damage: 3, fireRate: 200, cost: 400 },
      { name: 'Paper Airplane Cannon', damage: 5, fireRate: 130, cost: 900 }
    ];
    let currentGunIndex;
    let lastShotTime;

    // Game state
    let bullets;
    let enemies;
    let credits;
    let spawnTimer;
    let spawnInterval;
    let gameOver;
    let lastTime;

    function resetGame() {
      player = {
        x: playerBase.x,
        y: playerBase.y,
        w: playerBase.w,
        h: playerBase.h,
        color: playerBase.color,
        health: playerBase.maxHealth
      };
      currentGunIndex = 0;
      lastShotTime = 0;
      bullets = [];
      enemies = [];
      credits = 0;
      spawnTimer = 0;
      spawnInterval = 1400;
      gameOver = false;
      lastTime = performance.now();
      gameOverBox.style.display = 'none';
      updateUI();
      enableShopButtons();
    }

    function updateUI() {
      creditsEl.textContent = credits;
      gunNameEl.textContent = guns[currentGunIndex].name;
      damageEl.textContent = guns[currentGunIndex].damage;
      firerateEl.textContent = guns[currentGunIndex].fireRate + ' ms';
      healthEl.textContent = player.health;
      updateShopButtonStates();
    }

    function updateShopButtonStates() {
      const nerf = guns[1];
      const rubber = guns[2];
      const paper = guns[3];

      buyNerfBtn.disabled = (currentGunIndex >= 1) || credits < nerf.cost;
      buyRubberBtn.disabled = (currentGunIndex >= 2) || credits < rubber.cost;
      buyPaperBtn.disabled = (currentGunIndex >= 3) || credits < paper.cost;
    }

    function enableShopButtons() {
      buyNerfBtn.disabled = false;
      buyRubberBtn.disabled = false;
      buyPaperBtn.disabled = false;
    }

    function spawnEnemy() {
      // B = sleepy student, C = coffee teacher
      const type = Math.random() < 0.6 ? 'student' : 'teacher';

      let hp, speed, reward, color, label;
      if (type === 'student') {
        hp = 3;
        speed = 0.7 + Math.random() * 0.4;
        reward = 10;
        color = '#7cf';
        label = 'Sleepy Student';
      } else {
        hp = 6;
        speed = 1.0 + Math.random() * 0.6;
        reward = 20;
        color = '#fc7';
        label = 'Coffee Teacher';
      }

      enemies.push({
        x: WIDTH + 40,
        y: HEIGHT - 130,
        w: 40,
        h: 70,
        hp,
        maxHp: hp,
        speed,
        reward,
        color,
        label
      });
    }

    function shoot() {
      const now = performance.now();
      const gun = guns[currentGunIndex];
      if (now - lastShotTime < gun.fireRate || gameOver) return;
      lastShotTime = now;

      bullets.push({
        x: player.x + player.w,
        y: player.y + player.h / 2,
        vx: 7,
        vy: 0,
        damage: gun.damage,
        radius: 5
      });
    }

    canvas.addEventListener('mousedown', () => {
      shoot();
    });

    function buyGun(index) {
      const gun = guns[index];
      if (currentGunIndex >= index) return;
      if (credits >= gun.cost) {
        credits -= gun.cost;
        currentGunIndex = index;
        updateUI();
      }
    }
