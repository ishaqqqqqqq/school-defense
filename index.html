<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>schooldf</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: sans-serif;
  }

  #ui {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 20;
    font-size: 18px;
    background: rgba(0,0,0,0.4);
    padding: 8px 12px;
    border-radius: 6px;
  }

  #crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 8px;
    height: 8px;
    margin-left: -4px;
    margin-top: -4px;
    border-radius: 50%;
    border: 2px solid white;
    pointer-events: none;
    z-index: 10;
  }

  #info {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0.7;
    font-size: 14px;
  }

  #err {
    white-space: pre;
    color: red;
    font-family: monospace;
    padding: 10px;
  }
</style>
</head>
<body>

<div id="err"></div>

<div id="ui">
  Credits: <span id="credits">0</span><br>
  Health: <span id="health">100</span>
</div>

<div id="crosshair"></div>
<div id="info">Click to lock mouse. WASD to move. Left click to shoot.</div>

<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById("err").textContent += 
    msg + " at " + line + ":" + col + "\n";
};
</script>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { PointerLockControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js";


// UI
let credits = 0;
let health = 100;

const creditsEl = document.getElementById("credits");
const healthEl = document.getElementById("health");

function updateUI() {
  creditsEl.textContent = credits;
  healthEl.textContent = health;
}
updateUI();

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 5, 10);
camera.lookAt(0, 5, 0);


// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTS
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(20, 50, 20);
scene.add(sun);

// FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshPhongMaterial({ color: 0x303030 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// DEBUG CUBE
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(20, 20, 20),
  new THREE.MeshStandardMaterial({ color: 0xff00ff })
);
cube.position.set(0, 10, 0);
scene.add(cube);

// CONTROLS
const controls = new PointerLockControls(camera, document.body);
document.body.addEventListener("click", () => controls.lock());

// MOVEMENT
const move = { f: false, b: false, l: false, r: false };
const vel = new THREE.Vector3();
const dir = new THREE.Vector3();

document.addEventListener("keydown", e => {
  if (e.code === "KeyW") move.f = true;
  if (e.code === "KeyS") move.b = true;
  if (e.code === "KeyA") move.l = true;
  if (e.code === "KeyD") move.r = true;
});

document.addEventListener("keyup", e => {
  if (e.code === "KeyW") move.f = false;
  if (e.code === "KeyS") move.b = false;
  if (e.code === "KeyA") move.l = false;
  if (e.code === "KeyD") move.r = false;
});

// RESIZE
window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ANIMATE LOOP
let last = performance.now();
function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const dt = (now - last) / 1000;
  last = now;

  if (controls.isLocked) {
    vel.x -= vel.x * 10 * dt;
    vel.z -= vel.z * 10 * dt;

    dir.z = Number(move.f) - Number(move.b);
    dir.x = Number(move.r) - Number(move.l);
    dir.normalize();

    const speed = 20;
    if (move.f || move.b) vel.z -= dir.z * speed * dt;
    if (move.l || move.r) vel.x -= dir.x * speed * dt;

    controls.moveRight(-vel.x * dt);
    controls.moveForward(-vel.z * dt);
  }

  renderer.render(scene, camera);
}

animate();
  //ishaq is cool
</script>
