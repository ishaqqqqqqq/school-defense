<!DOCTYPE html>
<html>
<head>
  <title>School Defense Test</title>
  <style>
    body {
      margin: 0;
      background: #222;
      color: #fff;
      font-family: sans-serif;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 2;

    #shop {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);

      border-radius: 8px;
      z-index: 2;
    }

    canvas {
      width: 900px !important;
      height: 500px !important;
      background: #000 !important;
      border: 3px solid red !important;
      display: block;
      margin: 80px auto 0 auto;
    }
  </style>
</head>
<body>

  <div id="ui">
    <div>Credits: 0</div>
    <div>Gun: Pencil Shooter</div>
    <div>Damage: 1</div>
    <div>Fire Rate: 400 ms</div>
    <div>Health: 3</div>
  </div>

  <div id="shop">
    <strong>Shop</strong><br>
    Nerf Blaster ($150)<br>
    Rubber Band Launcher ($400)<br>
    Paper Airplane Cannon ($900)
  </div>

  <canvas id="game" width="900" height="500"></canvas>

  <script>
alert("Script is running!");
  </script>

</body>
</html>
