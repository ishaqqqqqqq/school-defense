<!DOCTYPE html>
<html>
<head>
  <title>School Defense</title>
  <style>
    body {
      margin: 0;
      background: #222;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      text-align: left;
      z-index: 2;
      font-size: 14px;
    }
    #shop {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 2;
    }
    button {
      margin-top: 5px;
      width: 100%;
      cursor: pointer;
      background: #444;
      color: #fff;
      border: 1px solid #777;
      border-radius: 4px;
      padding: 4px;
    }
    button:disabled {
      background: #222;
      color: #777;
      border-color: #555;
      cursor: default;
    }
    canvas {
      display: block;
      margin: 0 auto;
      background: #333;
      border-top: 10px solid #555;
      border-bottom: 10px solid #555;
    }
    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 20px 30px;
      border-radius: 10px;
      display: none;
      z-index: 3;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div>Credits: <span id="credits">0</span></div>
    <div>Gun: <span id="gunName">Pencil Shooter</span></div>
    <div>Damage: <span id="damage">1</span></div>
    <div>Fire Rate: <span id="firerate">400 ms</span></div>
    <div>Health: <span id="health">3</span></div>
