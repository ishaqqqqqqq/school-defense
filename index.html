<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School Defense FPS — Clean Build</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: sans-serif;
  }

  #ui {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 20;
    font-size: 18px;
    background: rgba(0,0,0,0.4);
    padding: 8px 12px;
    border-radius: 6px;
  }

  #crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 8px;
    height: 8px;
    margin-left: -4px;
    margin-top: -4px;
    border-radius: 50%;
    border: 2px solid white;
    pointer-events: none;
    z-index: 10;
  }

  #info {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0.7;
    font-size: 14px;
  }

  #err {
    white-space: pre;
    color: red;
    font-family: monospace;
    padding: 10px;
  }
</style>
</head>
<body>

<div id="err"></div>

<div id="ui">
  Credits: <span id="credits">0</span><br>
  Health: <span id="health">100</span>
</div>

<div id="crosshair"></div>
<div id="info">Click to lock mouse. WASD to move. Left click to shoot.</div>

<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById("err").textContent += 
    msg + " at " + line + ":" + col + "\n";
};
</script>
