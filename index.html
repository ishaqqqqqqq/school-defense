<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School Defense</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #202020;
  }
  #startOverlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    font-size: 2em;
    cursor: pointer;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="startOverlay">Click to Start</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { PointerLockControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js";

// ----------------------
// SCENE
// ----------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

// ----------------------
// CAMERA
// ----------------------
const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);

// ----------------------
// RENDERER
// ----------------------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ----------------------
// POINTER LOCK CONTROLS
// ----------------------
const controls = new PointerLockControls(camera, document.body);
const overlay = document.getElementById("startOverlay");
overlay.addEventListener("click", () => {
  controls.lock();
});

// Hide overlay when pointer lock is active
controls.addEventListener("lock", () => overlay.style.display = "none");
controls.addEventListener("unlock", () => overlay.style.display = "flex");

// ----------------------
// MOVEMENT STATE
// ----------------------
const move = { f: false, b: false, l: false, r: false };
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();

document.addEventListener("keydown", e => {
  if (e.code === "KeyW") move.f = true;
  if (e.code === "KeyS") move.b = true;
  if (e.code === "KeyA") move.l = true;
  if (e.code === "KeyD") move.r = true;
});

document.addEventListener("keyup", e => {
  if (e.code === "KeyW") move.f = false;
  if (e.code === "KeyS") move.b = false;
  if (e.code === "KeyA") move.l = false;
  if (e.code === "KeyD") move.r = false;
});

// ----------------------
// LIGHTS
// ----------------------
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0x404040, 0.5);
scene.add(ambLight);

// ----------------------
// OBJECTS
// ----------------------
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({ color: 0xff00ff })
);
cube.position.set(0, 0.5, 0);
scene.add(cube);

camera.lookAt(cube.position);

// ----------------------
// CLOCK FOR DELTA TIME
// ----------------------
const clock = new THREE.Clock();

// ----------------------
// ANIMATION LOOP
// ----------------------
function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();
  const speed = 10;
  const friction = 8;

  if (controls.isLocked) {
    // Apply friction
    velocity.x -= velocity.x * friction * dt;
    velocity.z -= velocity.z * friction * dt;

    // Determine movement direction
    direction.z = Number(move.f) - Number(move.b);
    direction.x = Number(move.r) - Number(move.l);
    direction.normalize();

    // Apply movement
    if (move.f || move.b) velocity.z += direction.z * speed * dt;
    if (move.l || move.r) velocity.x += direction.x * speed * dt;

    controls.moveRight(velocity.x * dt);
    controls.moveForward(velocity.z * dt);
  }

  // Rotate the cube for visibility
  cube.rotation.x += 0.01;
  cube.rotation.y += 0.01;

  renderer.render(scene, camera);
}

animate();

// ----------------------
// HANDLE RESIZE
// ----------------------
window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
