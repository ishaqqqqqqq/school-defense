<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FPS Test</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      margin-left: -4px;
      margin-top: -4px;
      border: 2px solid white;
      border-radius: 50%;
      pointer-events: none;
      z-index: 10;
    }

    #info {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      opacity: 0.8;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="crosshair"></div>
<div id="info">Click to lock mouse. WASD to move.</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/controls/PointerLockControls.js"></script>

<script>
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x202028);

  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Lighting
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5, 10, 5);
  scene.add(light);

  // Floor
  const floorGeo = new THREE.PlaneGeometry(200, 200);
  const floorMat = new THREE.MeshPhongMaterial({ color: 0x303030 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);

  // Walls
  const wallGeo = new THREE.BoxGeometry(200, 20, 2);
  const wallMat = new THREE.MeshPhongMaterial({ color: 0x505050 });

  const wall1 = new THREE.Mesh(wallGeo, wallMat);
  wall1.position.set(0, 10, -50);
  scene.add(wall1);

  const wall2 = wall1.clone();
  wall2.position.set(0, 10, 50);
  scene.add(wall2);

  const wall3 = new THREE.Mesh(new THREE.BoxGeometry(2, 20, 200), wallMat);
  wall3.position.set(-50, 10, 0);
  scene.add(wall3);

  const wall4 = wall3.clone();
  wall4.position.set(50, 10, 0);
  scene.add(wall4);

  // Controls
  const controls = new THREE.PointerLockControls(camera, document.body);
  camera.position.set(0, 2, 5);

  document.body.addEventListener("click", () => {
    controls.lock();
  });

  const move = { forward: false, backward: false, left: false, right: false };
  const velocity = new THREE.Vector3();
  const direction = new THREE.Vector3();

  document.addEventListener("keydown", (e) => {
    if (e.code === "KeyW") move.forward = true;
    if (e.code === "KeyS") move.backward = true;
    if (e.code === "KeyA") move.left = true;
    if (e.code === "KeyD") move.right = true;
  });

  document.addEventListener("keyup", (e) => {
    if (e.code === "KeyW") move.forward = false;
    if (e.code === "KeyS") move.backward = false;
    if (e.code === "KeyA") move.left = false;
    if (e.code === "KeyD") move.right = false;
  });

  let last = performance.now();

  function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const delta = (now - last) / 1000;
    last = now;

    if (controls.isLocked) {
      velocity.x -= velocity.x * 10 * delta;
      velocity.z -= velocity.z * 10 * delta;

      direction.z = Number(move.forward) - Number(move.backward);
      direction.x = Number(move.right) - Number(move.left);
      direction.normalize();

      const speed = 20;

      if (move.forward || move.backward)
        velocity.z -= direction.z * speed * delta;
      if (move.left || move.right)
        velocity.x -= direction.x * speed * delta;

      controls.moveRight(-velocity.x * delta);
      controls.moveForward(-velocity.z * delta);
    }

    renderer.render(scene, camera);
  }

  animate();
</script>

</body>
</html>
